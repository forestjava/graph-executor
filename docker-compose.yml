services:
  graph-organizer:
    build: .
    container_name: graph-organizer
    restart: unless-stopped
    environment:
      - PORT
      - ASSETS_DIR
      - NEO4J_URI
      - NEO4J_DATABASE
      - NEO4J_USER
      - NEO4J_PASSWORD
      - API_KEY
    networks:
      - proxy

networks:
  proxy:
    external: true
